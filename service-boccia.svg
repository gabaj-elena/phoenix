<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-boccia" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="50%" stop-color="#7BD3B0"/>
      <stop offset="100%" stop-color="#3FB28F"/>
    </linearGradient>
    <radialGradient id="court" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-boccia)"/>
  <!-- Поле бочча -->
  <rect x="80" y="80" width="440" height="240" rx="20" fill="#fff" opacity="0.25" stroke="#fff" stroke-width="3" stroke-dasharray="10 5"/>
  <!-- Линия броска -->
  <line x1="80" y1="320" x2="520" y2="320" stroke="#fff" stroke-width="4"/>
  <!-- Мячи -->
  <circle cx="300" cy="200" r="12" fill="#fff"/>
  <circle cx="280" cy="220" r="12" fill="#FF8B6B"/>
  <circle cx="320" cy="220" r="12" fill="#FFC857"/>
  <circle cx="260" cy="240" r="12" fill="#B19CD9"/>
  <circle cx="340" cy="240" r="12" fill="#FF8B6B"/>
  <circle cx="300" cy="180" r="12" fill="#7BD3B0" stroke="#fff" stroke-width="2"/>
  <text x="300" y="80" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">BOCCIA</text>
</svg>
