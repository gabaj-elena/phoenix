<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-art" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB5C5"/>
      <stop offset="50%" stop-color="#D7BDE2"/>
      <stop offset="100%" stop-color="#9CB8E0"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-art)"/>
  <!-- Мольберт -->
  <g transform="translate(300, 220)">
    <line x1="-80" y1="-100" x2="-100" y2="120" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
    <line x1="80" y1="-100" x2="100" y2="120" stroke="#8B4513" stroke-width="8" stroke-linecap="round"/>
    <line x1="-60" y1="120" x2="60" y2="120" stroke="#8B4513" stroke-width="6" stroke-linecap="round"/>
    <!-- Холст -->
    <rect x="-70" y="-100" width="140" height="170" fill="#fff" rx="4"/>
    <!-- Абстрактная картина -->
    <circle cx="-30" cy="-60" r="20" fill="#FFC857"/>
    <circle cx="20" cy="-30" r="25" fill="#FF8B6B"/>
    <path d="M-50 0 Q0 -20 50 20 L50 60 L-50 60 Z" fill="#7BD3B0"/>
    <path d="M-40 30 L40 50" stroke="#5A7EBF" stroke-width="4"/>
  </g>
  <!-- Палитра -->
  <g transform="translate(120, 320)">
    <ellipse cx="0" cy="0" rx="50" ry="35" fill="#fff" stroke="#8B4513" stroke-width="3"/>
    <circle cx="-20" cy="-10" r="6" fill="#FF8B6B"/>
    <circle cx="0" cy="-15" r="6" fill="#FFC857"/>
    <circle cx="20" cy="-10" r="6" fill="#7BD3B0"/>
    <circle cx="-15" cy="10" r="6" fill="#5A7EBF"/>
    <circle cx="15" cy="10" r="6" fill="#B19CD9"/>
  </g>
</svg>
