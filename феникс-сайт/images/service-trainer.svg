<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-trainer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5A7EBF"/>
      <stop offset="50%" stop-color="#7BD3B0"/>
      <stop offset="100%" stop-color="#FFC857"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#bg-trainer)"/>
  <!-- Медаль/кубок -->
  <g transform="translate(300, 200)">
    <!-- Лента -->
    <path d="M-30 -100 L-15 -50 L-25 -50 L-15 0" fill="#E8553A"/>
    <path d="M30 -100 L15 -50 L25 -50 L15 0" fill="#E8553A"/>
    <!-- Медаль -->
    <circle cx="0" cy="20" r="60" fill="#FFD700" stroke="#E89A1F" stroke-width="6"/>
    <circle cx="0" cy="20" r="48" fill="#FFC857"/>
    <text x="0" y="15" font-family="Arial" font-size="22" fill="#fff" text-anchor="middle" font-weight="900">№1</text>
    <text x="0" y="40" font-family="Arial" font-size="14" fill="#fff" text-anchor="middle" font-weight="700">ТРЕНЕР</text>
  </g>
  <!-- Звёзды -->
  <text x="100" y="80" font-family="Arial" font-size="40" fill="#fff" opacity="0.7">★</text>
  <text x="480" y="100" font-family="Arial" font-size="50" fill="#fff" opacity="0.7">★</text>
  <text x="80" y="320" font-family="Arial" font-size="30" fill="#fff" opacity="0.7">✦</text>
  <text x="510" y="310" font-family="Arial" font-size="35" fill="#fff" opacity="0.7">✦</text>
</svg>
